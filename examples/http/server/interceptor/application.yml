app:
  name: stellar-http-server-interceptor-example
  env: dev
  zone: local

http:
  server:
    enabled: true
    port: 18086
    adapter: gin
    observability:
      trace: true
      metrics: true
      logs: true

opentelemetry:
  log:
    enabled: false
    output: stdout
  trace: false
  metrics: false
  trace_output: none
