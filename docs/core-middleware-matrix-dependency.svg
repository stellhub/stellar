  <text x="1260" y="159" class="legend">主依赖：通过公开 API / SDK / 配置 / 策略进行单向依赖</text>
  <line x1="1150" y1="192" x2="1240" y2="192" stroke="#FFB870" stroke-width="3.5" stroke-dasharray="12 10" marker-end="url(#arrowDash)"/>
  <text x="1260" y="197" class="legend">观测输出：统一向 Trace / Log / Metric 汇聚，再由告警平台闭环</text>

  <text x="72" y="1052" class="note">说明 1：该图依据 README 中“核心中间件矩阵”“依赖边界最终结论”抽象而来，强调层级与方向，不表示强绑定实现。</text>
  <text x="72" y="1076" class="note">说明 2：遵循 README 的约束，跨产品协作应通过公开契约完成，避免 productA/server 直接依赖 productB/server。</text>
