<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#0F1D33"/>
    </linearGradient>
    <linearGradient id="band1" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#183B66" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#102A4C" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="band2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#234D3C" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#16392C" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="band3" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#5C4420" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#453215" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="band4" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#4C305B" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#311D43" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowSolid" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#81D4FF"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#FFB870"/>
    </marker>
    <style>
      text {
        font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      .title {
        font-size: 34px;
        font-weight: 700;
        fill: #F4F8FF;
      }
      .subtitle {
        font-size: 17px;
        fill: #B4C6E3;
      }
      .band-title {
        font-size: 20px;
        font-weight: 700;
        fill: #F6FAFF;
      }
      .band-desc {
        font-size: 13px;
        fill: #D7E2F6;
      }
      .node-title {
        font-size: 18px;
        font-weight: 700;
        fill: #F8FBFF;
      }
      .node-subtitle {
        font-size: 14px;
        fill: #DCE7F9;
      }
      .legend {
        font-size: 14px;
        fill: #D4E0F5;
      }
      .note {
        font-size: 13px;
        fill: #9FB3D6;
      }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>
  <circle cx="1420" cy="120" r="260" fill="#1D3F73" fill-opacity="0.18"/>
  <circle cx="190" cy="980" r="260" fill="#4B2F60" fill-opacity="0.12"/>
  <circle cx="420" cy="130" r="180" fill="#194B4A" fill-opacity="0.08"/>

  <text x="72" y="74" class="title">星轴核心中间件矩阵层级依赖图</text>
  <text x="72" y="106" class="subtitle">基于 README.md 的职责定义与依赖边界整理，表达“推荐的公开依赖方向”，而非服务端之间的直接实现耦合。</text>

  <rect x="60" y="150" width="1480" height="170" rx="28" fill="url(#band1)" stroke="#4C7BB7" stroke-opacity="0.45"/>
  <rect x="60" y="350" width="1480" height="210" rx="28" fill="url(#band2)" stroke="#5CA583" stroke-opacity="0.45"/>
  <rect x="60" y="590" width="1480" height="190" rx="28" fill="url(#band3)" stroke="#C89A5A" stroke-opacity="0.42"/>
  <rect x="60" y="810" width="1480" height="210" rx="28" fill="url(#band4)" stroke="#A57CC9" stroke-opacity="0.42"/>

  <text x="92" y="190" class="band-title">L1 接入与安全层</text>
  <text x="92" y="214" class="band-desc">统一入口、身份与零信任校验，位于最上游。</text>

  <text x="92" y="390" class="band-title">L2 治理与运行层</text>
  <text x="92" y="414" class="band-desc">流量治理、调度编排、异步通信等核心运行能力，依赖基础设施并向观测层输出信号。</text>

  <text x="92" y="630" class="band-title">L3 基础支撑层</text>
  <text x="92" y="654" class="band-desc">注册、配置、锁与密钥等基础能力，向上提供稳定契约。</text>

  <text x="92" y="850" class="band-title">L4 可观测与告警层</text>
  <text x="92" y="874" class="band-desc">统一承接链路、日志、指标，并驱动告警闭环。</text>

  <g filter="url(#shadow)">
    <rect x="220" y="210" width="300" height="82" rx="18" fill="#245B93" stroke="#8BD0FF" stroke-opacity="0.65"/>
    <text x="250" y="242" class="node-title">EventHorizon · 视界</text>
    <text x="250" y="268" class="node-subtitle">网关入口 / 统一访问边界</text>

    <rect x="860" y="210" width="300" height="82" rx="18" fill="#245B93" stroke="#8BD0FF" stroke-opacity="0.65"/>
    <text x="890" y="242" class="node-title">StarShield · 星盾</text>
    <text x="890" y="268" class="node-subtitle">零信平台 / 身份与策略</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="440" width="260" height="88" rx="18" fill="#21614D" stroke="#90E2B8" stroke-opacity="0.7"/>
    <text x="120" y="474" class="node-title">Orbit · 星轨</text>
    <text x="120" y="500" class="node-subtitle">服务治理 / 路由与编排</text>

    <rect x="420" y="440" width="260" height="88" rx="18" fill="#21614D" stroke="#90E2B8" stroke-opacity="0.7"/>
    <text x="450" y="474" class="node-title">Pulsar · 脉冲</text>
    <text x="450" y="500" class="node-subtitle">流控熔断 / 保护与降级</text>

    <rect x="750" y="440" width="260" height="88" rx="18" fill="#21614D" stroke="#90E2B8" stroke-opacity="0.7"/>
    <text x="780" y="474" class="node-title">Astrolabe · 星盘</text>
    <text x="780" y="500" class="node-subtitle">任务调度 / 分布式编排</text>

    <rect x="1080" y="440" width="260" height="88" rx="18" fill="#21614D" stroke="#90E2B8" stroke-opacity="0.7"/>
    <text x="1110" y="474" class="node-title">CometFlow · 彗流</text>
    <text x="1110" y="500" class="node-subtitle">消息队列 / 异步事件流</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="660" width="260" height="86" rx="18" fill="#70531E" stroke="#FFD38A" stroke-opacity="0.72"/>
    <text x="120" y="694" class="node-title">StarMap · 星图</text>
    <text x="120" y="720" class="node-subtitle">注册中心 / 服务发现</text>

    <rect x="420" y="660" width="260" height="86" rx="18" fill="#70531E" stroke="#FFD38A" stroke-opacity="0.72"/>
    <text x="450" y="694" class="node-title">Nebula · 星云</text>
    <text x="450" y="720" class="node-subtitle">配置中心 / 动态配置</text>

    <rect x="750" y="660" width="260" height="86" rx="18" fill="#70531E" stroke="#FFD38A" stroke-opacity="0.72"/>
    <text x="780" y="694" class="node-title">Singularity · 奇点</text>
    <text x="780" y="720" class="node-subtitle">分布式锁 / 互斥协调</text>

    <rect x="1080" y="660" width="260" height="86" rx="18" fill="#70531E" stroke="#FFD38A" stroke-opacity="0.72"/>
    <text x="1110" y="694" class="node-title">StarKey · 星钥</text>
    <text x="1110" y="720" class="node-subtitle">密钥中心 / 凭据管理</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="890" width="260" height="88" rx="18" fill="#5A3472" stroke="#D7B6FF" stroke-opacity="0.72"/>
    <text x="120" y="924" class="node-title">StarTrace · 星迹</text>
    <text x="120" y="950" class="node-subtitle">链路追踪 / Trace 汇聚</text>

    <rect x="420" y="890" width="260" height="88" rx="18" fill="#5A3472" stroke="#D7B6FF" stroke-opacity="0.72"/>
    <text x="450" y="924" class="node-title">Spectrum · 星谱</text>
    <text x="450" y="950" class="node-subtitle">日志平台 / Log 汇聚</text>

    <rect x="750" y="890" width="260" height="88" rx="18" fill="#5A3472" stroke="#D7B6FF" stroke-opacity="0.72"/>
    <text x="780" y="924" class="node-title">Constellation · 星座</text>
    <text x="780" y="950" class="node-subtitle">指标平台 / Metric 汇聚</text>

    <rect x="1080" y="890" width="260" height="88" rx="18" fill="#5A3472" stroke="#D7B6FF" stroke-opacity="0.72"/>
    <text x="1110" y="924" class="node-title">NovaSignal · 星讯</text>
    <text x="1110" y="950" class="node-subtitle">告警平台 / 告警收敛与通知</text>
  </g>

